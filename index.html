<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Galerie</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #121212; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .item { cursor: pointer; border-radius: 8px; overflow: hidden; background: #222; }
        .item img { width: 100%; height: 200px; object-fit: cover; display: block; }
        .lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; flex-direction: column; z-index: 1000; }
        .lightbox canvas, .lightbox img { max-width: 90%; max-height: 80%; }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="grid" id="gallery"></div>

<div class="lightbox" id="lightbox">
    <canvas id="gif-canvas"></canvas>
    <img id="main-view" style="display: none;">
    <div class="controls">
        <button onclick="downloadImage()">Download</button>
        <button onclick="closeLightbox()">Close</button>
    </div>
</div>

<script>
    const images = ['meme1.jpg', 'meme2.png', 'meme3.gif'];
    const grid = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const mainView = document.getElementById('main-view');
    const canvas = document.getElementById('gif-canvas');
    const ctx = canvas.getContext('2d');
    let currentSrc = '';

    images.forEach(src => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `<img src="${src}" onclick="openLightbox('${src}')">`;
        grid.appendChild(div);
    });

    function openLightbox(src) {
        currentSrc = src;
        lightbox.style.display = 'flex';
        
        if (src.toLowerCase().endsWith('.gif')) {
            mainView.style.display = 'none';
            canvas.style.display = 'block';
            const img = new Image();
            img.src = src;
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
            };
        } else {
            canvas.style.display = 'none';
            mainView.style.display = 'block';
            mainView.src = src;
        }
    }

    function closeLightbox() {
        lightbox.style.display = 'none';
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.href = currentSrc;
        link.download = currentSrc.split('/').pop();
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
