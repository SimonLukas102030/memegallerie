<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }
        .header {
            max-width: 1200px;
            margin: 0 auto 20px auto;
            text-align: center;
        }
        .progress-container {
            width: 100%;
            max-width: 400px;
            height: 6px;
            background: #e5e5ea;
            border-radius: 3px;
            margin: 20px auto;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: #007aff;
            transition: width 0.3s ease, background 0.3s ease;
        }
        .progress-bar.error {
            background: #ff3b30;
        }
        .error-log {
            color: #ff3b30;
            font-size: 13px;
            margin-top: 10px;
            min-height: 15px;
            font-weight: 500;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .item {
            position: relative;
            padding-top: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: #e5e5ea;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .item:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .item img.loaded {
            opacity: 1;
        }
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .lightbox.active {
            display: flex;
            opacity: 1;
        }
        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 75vh;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .lightbox canvas, .lightbox img.main-image {
            display: block;
            max-width: 100%;
            max-height: 75vh;
            object-fit: contain;
        }
        .controls {
            margin-top: 30px;
            display: flex;
            gap: 15px;
        }
        button {
            background: rgba(0,0,0,0.05);
            border: none;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            color: #1d1d1f;
            transition: background 0.2s;
        }
        button:hover {
            background: rgba(0,0,0,0.1);
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.08);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
            color: #1d1d1f;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="error-log" id="errorLog"></div>
    </div>
    
    <div class="grid" id="gallery"></div>
    
    <div class="lightbox" id="lightbox">
        <div class="close-btn" onclick="closeLightbox()">✕</div>
        <div class="lightbox-content">
            <canvas id="gifCanvas" style="display: none;"></canvas>
            <img id="mainView" class="main-image" style="display: none;">
        </div>
        <div class="controls">
            <button onclick="downloadItem()">Download</button>
        </div>
    </div>
    
    <script>
        const files = [
            'meme1.jpeg',
            'meme2.gif',
            'meme3.png'
        ];
        
        const grid = document.getElementById('gallery');
        const progressBar = document.getElementById('progressBar');
        const errorLog = document.getElementById('errorLog');
        const lightbox = document.getElementById('lightbox');
        const mainView = document.getElementById('mainView');
        const gifCanvas = document.getElementById('gifCanvas');
        const ctx = gifCanvas.getContext('2d');
        
        let loadedCount = 0;
        let currentFile = '';
        
        function updateProgress(isError, filename) {
            loadedCount++;
            const percentage = (loadedCount / files.length) * 100;
            progressBar.style.width = percentage + '%';
            
            if (isError) {
                progressBar.classList.add('error');
                const errorMsg = document.createElement('div');
                errorMsg.textContent = `Error 404: File not found -> ${filename}`;
                errorLog.appendChild(errorMsg);
            }
            
            if (loadedCount === files.length) {
                setTimeout(() => {
                    progressBar.parentElement.style.opacity = '0';
                }, 1000);
            }
        }
        
        files.forEach(filename => {
            const item = document.createElement('div');
            item.className = 'item';
            
            const img = new Image();
            img.onload = () => {
                img.classList.add('loaded');
                updateProgress(false);
            };
            img.onerror = () => {
                updateProgress(true, filename);
            };
            
            img.src = filename;
            img.onclick = () => openLightbox(filename);
            
            item.appendChild(img);
            grid.appendChild(item);
        });
        
        function openLightbox(filename) {
            currentFile = filename;
            lightbox.classList.add('active');
            
            if (filename.toLowerCase().endsWith('.gif')) {
                mainView.style.display = 'none';
                gifCanvas.style.display = 'block';
                
                const img = new Image();
                img.src = filename;
                img.onload = () => {
                    gifCanvas.width = img.width;
                    gifCanvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                };
            } else {
                gifCanvas.style.display = 'none';
                mainView.style.display = 'block';
                mainView.src = filename;
            }
        }
        
        function closeLightbox() {
            lightbox.classList.remove('active');
            setTimeout(() => {
                mainView.src = '';
                ctx.clearRect(0, 0, gifCanvas.width, gifCanvas.height);
            }, 300);
        }
        
        function downloadItem() {
            const link = document.createElement('a');
            link.href = currentFile;
            link.download = currentFile.split('/').pop();
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
